<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #f7f5ef;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #1f1e1d;
  }
  .wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: 24px 14px 40px;
  }
  .canvas {
    background: #fffdf8;
    border: 1px solid rgba(31,30,29,.12);
    border-radius: 18px;
    box-shadow: 0 14px 40px rgba(31,30,29,.08);
    padding: 14px;
    overflow: auto;
  }
  svg {
    display: block;
    width: 100%;
    height: auto;
  }
  g[onclick] { cursor: pointer; }
  g[onclick] rect { transition: transform .18s ease, filter .18s ease; transform-box: fill-box; transform-origin: center; }
  g[onclick]:hover rect { transform: translateY(-2px); filter: drop-shadow(0 4px 6px rgba(0,0,0,.12)); }

  .qa-panel {
    position: fixed;
    top: 76px;
    width: min(330px, calc(50vw - 28px));
    max-height: calc(100vh - 120px);
    overflow: auto;
    background: rgba(255,253,248,.98);
    border: 1px solid rgba(31,30,29,.14);
    border-radius: 18px;
    box-shadow: 0 18px 50px rgba(31,30,29,.16);
    padding: 16px;
    z-index: 10;
    display: none;
    backdrop-filter: blur(8px);
  }
  .qa-panel.left { left: 18px; }
  .qa-panel.right { right: 18px; }
  .qa-panel.show { display: block; }
  .qa-kicker {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .04em;
    color: #8a6b2e;
    margin: 0 0 6px;
  }
  .qa-title {
    font-size: 16px;
    font-weight: 800;
    line-height: 1.35;
    color: #1f1e1d;
    margin: 0 20px 10px 0;
  }
  .qa-body {
    font-size: 14px;
    line-height: 1.65;
    color: #2d2b28;
  }
  .qa-body p { margin: 0 0 10px; }
  .qa-body strong { color: #1f1e1d; }
  .close-action {
    position: absolute;
    right: 10px;
    top: 8px;
    width: 28px;
    height: 28px;
    border: 0;
    border-radius: 999px;
    background: #ece7da;
    color: #1f1e1d;
    cursor: pointer;
    font-size: 18px;
    line-height: 28px;
  }
  g.active-node rect { filter: drop-shadow(0 0 7px rgba(138,107,46,.45)); stroke-width: 2px; }
  @media (max-width: 1120px) {
    .qa-panel { position: fixed; left: 14px !important; right: 14px !important; width: auto; max-height: 38vh; }
    .qa-panel.left { top: auto; bottom: 51vh; }
    .qa-panel.right { top: auto; bottom: 18px; }
  }
  .toast {
    position: fixed;
    left: 50%;
    bottom: 20px;
    transform: translateX(-50%);
    background: rgba(31,30,29,.92);
    color: white;
    padding: 10px 14px;
    border-radius: 999px;
    font-size: 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease;
  }
  .toast.show { opacity: 1; }

/* Clean QA cards: no instructional labels, stable product-demo layout */
.qa-panel { max-height: 38vh; overflow-y: auto; }
.qa-panel .qa-body p { margin: 0 0 10px; line-height: 1.75; }
.qa-panel .qa-body p:last-child { margin-bottom: 0; }
</style>

  "介绍 OpenAI GPT-5 和 o3/o4-mini 推理模型的特点": [

  "介绍 Anthropic Claude 4.5 的特点与定位": [

  "Google Gemini 3 Ultra 和 Flash 分别适合什么场景": [

  "xAI Grok 3 实时网络能力和 X 平台整合有什么特点": [

  "Meta Llama 4 开源策略对全球 AI 生态的影响": [

  ],
  "DeepSeek V4 如何以极低成本实现顶级推理": [
    "DeepSeek 的标签通常是高性价比推理。它通过模型结构、训练策略和工程优化，把较强的数学、代码和逻辑能力做得更便宜。",
    "真正的启发是：AI 竞争不只拼最大模型，也拼效率。对普通用户来说，低成本意味着更多人能用到高级推理能力。"
  ],
  "Kimi K2 的超长上下文窗口适合哪些任务": [
    "超长上下文的价值是一次性读入大量材料，例如论文、合同、课程资料、会议记录、代码库或整本书。它适合做跨文档总结、信息抽取、对比分析和长材料问答。",
    "但上下文长不等于一定理解深。重要任务仍要让它分段总结、列依据、做交叉检查，避免把大量材料直接丢进去就期待完美答案。"
  ],
  "豆包 Doubao 在中文办公、内容创作和教育场景中的优势是什么": [
    "豆包的优势主要在中文语境、内容生产、办公辅助和教育场景的本土化体验。它更贴近中文表达习惯，也更容易服务短视频脚本、中文文案、课堂内容和日常办公。",
    "如果你的任务主要发生在中文生态里，比如教研、家长沟通、中文营销、短视频内容，豆包会比很多海外工具更接地气。"
  ],
  "Claude Code 终端原生 Agent 和普通 Claude 有何不同": [
    "普通 Claude 主要在聊天窗口里回答你；Claude Code 更像能进入项目文件、理解代码库、执行修改和跑命令的编程 Agent。差别不在模型本身，而在它能不能直接操作开发环境。",
    "非技术用户可以这样理解：Chat 是顾问，Claude Code 是能进厨房动手做菜的厨师。它适合真实项目开发，不只是解释代码。"
  ],
  "GitHub Copilot 如何深度集成进开发工作流": [
    "Copilot 的优势是嵌入 GitHub 和主流 IDE，能在写代码、补全函数、生成测试、解释错误、处理 PR 时提供帮助。它不是单独的聊天机器人，而是开发流程里的辅助层。",
    "适合已经在 GitHub 工作流里的团队。它的价值在于减少切换成本，让 AI 出现在你本来就写代码和审代码的地方。"
  ],
  "Cursor IDE 的 Vibe Coding 体验是什么": [
    "Cursor 是带 AI 的代码编辑器。所谓 Vibe Coding，就是你用自然语言描述目标，让 AI 读项目、改文件、生成代码，你再通过运行和反馈不断校正。",
    "它适合从 Demo 到原型的快速搭建。要做长期项目，仍需要学会基本工程概念，比如版本管理、环境变量、数据库和部署。"
  ],
  "Windsurf 的 Flow 全库感知体验是什么": [
    "Windsurf 强调 Flow，也就是让 AI 持续理解整个代码库和你的开发意图。它试图减少你反复解释背景的成本，让 AI 更像跟着项目上下文一起工作的搭档。",
    "它适合代码文件多、上下文复杂的项目。判断一个 AI IDE 好不好，关键看它是否真的理解项目结构，而不是只会改当前文件。"
  ],
  "Gemini CLI 终端编程工具的特点是什么": [
    "CLI 工具运行在终端里，适合直接和文件、命令、脚本、Git、测试流程互动。Gemini CLI 这类工具把模型能力带到开发者最底层的工作界面。",
    "它更适合有一点技术基础的人。非技术用户先用 Cursor 或 Bolt 更直观；等理解项目结构后，再学 CLI 会更稳。"

  "Amazon Q Developer 在 AWS 生态中的角色": [
    "Amazon Q Developer 是 AWS 里的开发与云服务助手，重点服务代码生成、云资源理解、故障排查、安全建议和 AWS 文档问答。",

  ],
  "Midjourney v7 的艺术审美特点": [
    "Midjourney 的核心优势是审美和风格化图像，尤其适合海报、概念图、插画、视觉探索和高质感创意图。它常常不用非常复杂的提示词，也能生成有艺术感的画面。",
    "它适合先找视觉方向，不一定最适合严肃商业交付。需要稳定角色、精确文字、品牌规范时，要结合后期编辑工具。"
  ],
  "DALL-E 4 在文字排版方面有何进步": [
    "DALL-E 系列的优势通常是和 ChatGPT 结合紧密，能更好理解自然语言需求，并在图像中处理文字、构图和具体修改。文字排版能力越强，就越适合海报、封面、信息图和教学图片。",
    "对你做课程海报、词汇图、课堂视觉材料很有用。关键是把文字、位置、风格和受众说清楚。"
  ],
  "Flux.2 的写实风格与开源定位": [
    "Flux 的看点是高质量写实图像和相对开放的生态。写实能力适合人物、产品、场景图；开放生态则方便开发者部署、微调和接入自己的工作流。",
    "如果你要做可控的商业图像流程，开放模型很有价值；如果只是偶尔出图，网页工具更省事。"
  ],
  "Google Imagen 4 的细节还原优势": [
    "Imagen 系列强调高质量图像生成和细节还原，尤其适合自然场景、产品质感、人物细节和复杂画面。它的优势来自 Google 的多模态研究和图像理解能力。",

function esc(text) {
  return String(text || '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function sendPrompt(text) {
  const node = event && event.currentTarget ? event.currentTarget : null;
  if (activeQuestion === text) {
    closeQA();
    return;
  }
  activeQuestion = text;
  if (activeNode) activeNode.classList.remove('active-node');
  activeNode = node;
  if (activeNode) activeNode.classList.add('active-node');

  const item = qaData[text] || [
    '这个节点对应一个 AI 产品或基础概念。核心学习方式是先弄清它解决什么问题，再比较它和相近工具的边界。',
    '建议把它放进具体任务里理解：写作、搜索、编程、出图、视频、语音或自动化。脱离任务谈工具，很容易越学越乱。'
  ];
  document.getElementById('qaQuestion').textContent = text;
  document.getElementById('qaAnswer').innerHTML = '<p>' + esc(item[0]) + '</p>';
  document.getElementById('qaUse').innerHTML = '<p>' + esc(item[1]) + '</p>';
  document.getElementById('qaLeft').classList.add('show');
  document.getElementById('qaRight').classList.add('show');
  showToast('已展示内置答案');
}

function closeQA() {
  document.getElementById('qaLeft').classList.remove('show');
  document.getElementById('qaRight').classList.remove('show');
  if (activeNode) activeNode.classList.remove('active-node');
  activeQuestion = '';
  activeNode = null;
}

function showToast(message) {
  const el = document.getElementById('toast');
  el.textContent = message || '已展示内置答案';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1600);
}
